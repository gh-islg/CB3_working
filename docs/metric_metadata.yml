# --- Environmental Conditions ---

ej_area_flag:
  domain: environment
  short_label: EJ Area (2024)
  label: Designated Environmental Justice Area (MOCEJ 2024)
  description: >
    Binary flag indicating whether the census tract is designated a 2024
    Environmental Justice Area by the Mayor's Office of Climate and Environmental
    Justice. Designation is based on 2010 tract boundaries (GEOID10) and joined
    to 2020 tracts via the primary contributing source tract.
  unit: ""
  palette: ["#f7f7f7", "#252525"]
  source: MOCEJ EJ Areas 2024
  year: 2024
  geography: Census tract (assigned from 2010 boundaries via crosswalk)
  higher_is: neutral
  map_classification: binary
  display_format: flag

rodent_active_inspections:
  domain: environment
  short_label: Rodent inspections
  label: DOHMH rodent inspections with confirmed rat activity (latest 5 years, 2021–2026)
  description: >
    Count of DOHMH rodent inspections where the result was "Rat Activity" or
    "Failed for Rat Activity and Other Reason", indicating confirmed rat
    presence. Covers all inspection types (initial, compliance, treatments)
    filed in CB3, restricted to the latest 5 years of available data
    (relative to the most recent inspection in the source file) rather than
    the full 2002-2026 history, so the metric reflects recent conditions.
    Preferred over 311 call volume as a measure of actual infestation burden
    because it reflects DOHMH-confirmed evidence rather than resident
    reporting behavior.
  unit: " inspections"
  palette: ["#f7fbff", "#c6dbef", "#6baed6", "#2171b5", "#08306b"]
  source: DOHMH Rodent Inspection (NYC OpenData)
  year: 2026
  geography: Census tract (spatially joined from point coordinates; CENSUS TRACT field as fallback)
  higher_is: worse
  map_classification: quintile
  display_format: count
  filename: rodent_inspections.html

avg_acceptable_streets_pct:
  domain: environment
  short_label: Street cleanliness
  label: "Acceptable Streets % — 12-month average (Oct 2022–Aug 2023)"
  description: >
    Average monthly "Acceptable Streets %" scorecard rating across the 11 non-null
    months from October 2022 through August 2023 (September 2023 is present in the
    data but reported as null). Reported at the DSNY cleaning section level
    (MN031–MN034), not census tract. Higher values indicate more block-faces rated
    acceptably clean during DSNY inspections.
  unit: "%"
  palette: ["#ffffcc", "#c2e699", "#78c679", "#31a354", "#006837"]
  source: DSNY Scorecard Ratings (NYC OpenData)
  year: 2023
  geography: DSNY cleaning section (MN031–MN034)
  higher_is: better
  map_classification: continuous
  display_format: percent
  filename: avg_acceptable_streets.html

avg_acceptable_sidewalks_pct:
  domain: environment
  short_label: Sidewalk cleanliness
  label: "Acceptable Sidewalks % — 12-month average (Oct 2022–Aug 2023)"
  description: >
    Average monthly "Acceptable Sidewalks %" scorecard rating across the 11 non-null
    months from October 2022 through August 2023. Reported at the DSNY cleaning
    section level (MN031–MN034), not census tract. Higher values indicate more
    block-faces rated acceptably clean.
  unit: "%"
  palette: ["#ffffcc", "#c2e699", "#78c679", "#31a354", "#006837"]
  source: DSNY Scorecard Ratings (NYC OpenData)
  year: 2023
  geography: DSNY cleaning section (MN031–MN034)
  higher_is: better
  map_classification: continuous
  display_format: percent
  filename: avg_acceptable_sidewalks.html

indoor_air_quality_complaints:
  domain: environment
  short_label: Air quality complaints
  label: DOHMH indoor air quality complaints (2010–April 2026)
  description: >
    Count of DOHMH complaints with type "Indoor Air Quality" filed in CB3,
    allocated to 2020 census tracts.
  unit: " complaints"
  palette: ["#fff7f3", "#fde0dd", "#fbb4b9", "#f768a1", "#7a0177"]
  source: DOHMH Indoor Environmental Complaints (NYC OpenData)
  year: 2026
  geography: Census tract
  higher_is: worse
  map_classification: quintile
  display_format: count

mold_complaints:
  domain: environment
  short_label: Mold complaints
  label: DOHMH mold complaints (2010–April 2026)
  description: >
    Count of DOHMH complaints with type "Mold" filed in CB3, allocated to
    2020 census tracts.
  unit: " complaints"
  palette: ["#fff7f3", "#fde0dd", "#fbb4b9", "#f768a1", "#7a0177"]
  source: DOHMH Indoor Environmental Complaints (NYC OpenData)
  year: 2026
  geography: Census tract
  higher_is: worse
  map_classification: quintile
  display_format: count

asbestos_complaints:
  domain: environment
  short_label: Asbestos complaints
  label: DOHMH asbestos complaints (2010–April 2026)
  description: >
    Count of DOHMH complaints with type "Asbestos" filed in CB3, allocated to
    2020 census tracts.
  unit: " complaints"
  palette: ["#fff7f3", "#fde0dd", "#fbb4b9", "#f768a1", "#7a0177"]
  source: DOHMH Indoor Environmental Complaints (NYC OpenData)
  year: 2026
  geography: Census tract
  higher_is: worse
  map_classification: quintile
  display_format: count

indoor_sewage_complaints:
  domain: environment
  short_label: Sewage complaints
  label: DOHMH indoor sewage complaints (2010–April 2026)
  description: >
    Count of DOHMH complaints with type "Indoor Sewage" filed in CB3, allocated
    to 2020 census tracts.
  unit: " complaints"
  palette: ["#fff7f3", "#fde0dd", "#fbb4b9", "#f768a1", "#7a0177"]
  source: DOHMH Indoor Environmental Complaints (NYC OpenData)
  year: 2026
  geography: Census tract
  higher_is: worse
  map_classification: quintile
  display_format: count

pm25:
  domain: environment
  short_label: Fine particulate matter (PM2.5)
  label: "PM2.5 — modeled annual average (Dec 2023–Dec 2024)"
  description: >
    NYCCAS (NYC Community Air Survey, DOHMH) Land Use Regression-modeled
    annual average PM2.5, at its native 300m grid resolution and clipped to
    the CB3 tract boundary. Plotted at each grid cell's own centroid rather
    than averaged to a tract value, since a 300m cell does not align with
    tract boundaries. DOHMH states this modeled surface is not comparable to
    regulatory monitoring or short-term localized monitoring.
  unit: " ug/m3"
  source: NYCCAS air pollution rasters (DOHMH)
  year: 2024
  geography: NYCCAS 300m grid cell (plotted at centroid)
  higher_is: worse
  map_classification: continuous
  display_format: number
  filename: environment_pm25.html

tree_health:
  domain: environment
  short_label: Street tree health
  label: Living street tree health status
  description: >
    Health rating (Good/Fair/Poor) of individual living street trees from the
    2015 TreesCount census, plotted at each tree's own coordinates rather
    than a tract statistic (no numeric magnitude to size a bubble by).
  category_colors:
    Good: "#238b45"
    Fair: "#fec44f"
    Poor: "#d94701"
  source: 2015 Street Tree Census (NYC Parks)
  year: 2015
  geography: Individual street tree
  higher_is: n/a
  map_classification: categorical
  display_format: category
  filename: street_tree_health.html

nycha_residential_building:
  domain: environment
  short_label: NYCHA residential buildings
  label: NYCHA residential building
  description: >
    Individual NYCHA residential buildings (by BBL), derived from Housing
    Maintenance Code Violation records as the only local file with
    building-level NYCHA coordinates. Shown as a fixed-color overlay on the
    hurricane evacuation zone map.
  category_colors:
    NYCHA residential building: "#252525"
  source: NYC HPD Housing Maintenance Code Violations (NYCHA properties)
  year: 2026
  geography: Individual NYCHA residential building (BBL)
  higher_is: n/a
  map_classification: categorical
  display_format: category
  filename: hurricane_evacuation_zones.html

dec_air_registrations:
  domain: environment
  short_label: DEC air facility registrations
  label: NYS DEC air facility registration
  description: >
    Individual facilities holding a NYS DEC air facility registration, the
    smallest of three emissions permit tiers (Title V, ASF, Registrations),
    issued to facilities with annual emissions below half the major-source
    threshold that do not require permit conditions. The other two tiers
    (Title V, ASF) were checked and found to have zero facilities within the
    CB3 tract boundary; Con Edison's East River Generating Station (Title V)
    sits ~150 feet from the boundary but just outside it, so is not included
    as an in-boundary point. Shown as a point-source overlay on the PM2.5 map
    per the original concept doc (supplement to PM2.5, alongside EPA TRI).
  category_colors:
    DEC air facility registration: "#6a51a3"
  source: NYSDEC Air Facility Registrations
  year: 2026
  geography: Individual facility point
  higher_is: worse
  map_classification: categorical
  display_format: category
  filename: environment_pm25.html

hurricane_evacuation_zone:
  domain: environment
  short_label: Hurricane evacuation zone
  label: NYC hurricane evacuation zone
  description: >
    NYC OEM hurricane evacuation zone designation (Zone 1 evacuates first;
    "X" indicates not in an evacuation zone), clipped to the CB3 tract
    boundary.
  category_colors:
    "1": "#a50026"
    "2": "#d73027"
    "3": "#f46d43"
    "4": "#fdae61"
    "5": "#fee08b"
    "6": "#d9ef8b"
    "7": "#a6d96a"
    "X": "#d9d9d9"
  source: NYC OEM Hurricane Evacuation Zones
  year: 2026
  geography: NYC Hurricane Evacuation Zone polygon (clipped to CB3)
  higher_is: worse
  map_classification: categorical
  display_format: category
  filename: hurricane_evacuation_zones.html

# --- Public Services ---

park_footprint:
  domain: public_service
  short_label: Park footprint
  label: Park property boundary
  description: >
    Real park property boundary polygons (not centroid points), shown as a
    plain outline/fill. Tooltip lists the park's category and recorded
    facility types.
  unit: ""
  fill_color: "#1a1a1a"
  outline_color: "#ffffff"
  source: NYC Parks Properties dataset (OpenData)
  year: 2026
  geography: Individual park property (polygon)
  higher_is: context
  map_classification: outline
  display_format: none
  filename: park_facility_inventory.html

park_facility_inventory:
  domain: public_service
  short_label: Park facility inventory
  label: Park facility type
  description: >
    Individual facility-type icons inside each park's real footprint
    (basketball court, other court, baseball/softball field, pool, football
    field, running track, soccer field, tennis court, playground, dog run).
    A park with more than one facility type has its icons spread around a
    small ring rather than stacked at one point. Pickleball courts,
    chess/game tables, and skate parks are not columns in the source
    facility inventory and are not represented here.
  unit: ""
  category_colors:
    Basketball court: "#e6194b"
    Other court: "#3cb44b"
    Baseball/softball field: "#4363d8"
    Pool: "#42d4f4"
    Football field: "#f58231"
    Running track: "#911eb4"
    Soccer field: "#469990"
    Tennis court: "#9a6324"
    Playground: "#000075"
    Dog run: "#808000"
  source: NYC Parks Facilities dataset (OpenData)
  year: 2026
  geography: Individual facility icon inside its park polygon
  higher_is: context
  map_classification: categorical
  display_format: category
  filename: park_facility_inventory.html

subway_access_pct:
  domain: public_service
  short_label: Subway access
  label: Tract area within ¼ mile of a subway entrance
  description: >
    Percent of tract area within a quarter mile of an MTA subway station
    entrance. Entrances were filtered to the CB3 bounding box in the source
    file, so a small number of entrances just outside CB3 may still
    contribute to accessibility along the district's edge. Computed but not
    mapped on its own; shown as a tooltip field on the public transportation
    access donut-marker map instead.
  unit: "%"
  source: MTA Subway Entrances and Exits (NYC OpenData)
  year: 2024
  geography: Census tract (¼-mile buffer from entrance point)
  higher_is: better
  map_classification: tooltip
  display_format: percent
  filename: context_only.html

subway_entrance_count:
  domain: public_service
  short_label: Subway entrances
  label: Subway station entrances
  description: >
    Count of MTA subway station entrances located within the tract, shown
    as one wedge of the public transportation access donut marker.
  unit: " stops"
  source: MTA Subway Entrances and Exits (NYC OpenData)
  year: 2024
  geography: Census tract
  higher_is: context
  map_classification: pie_bubble
  display_format: count
  filename: public_transportation_access.html

bus_stop_count:
  domain: public_service
  short_label: Bus stops
  label: MTA bus stops
  description: >
    Count of MTA bus stops located within the tract, shown as one wedge of
    the public transportation access donut marker.
  unit: " stops"
  source: MTA Bus Stops (NYC OpenData)
  year: 2024
  geography: Census tract
  higher_is: context
  map_classification: pie_bubble
  display_format: count
  filename: public_transportation_access.html

transit_stop_points:
  domain: public_service
  short_label: Transit stops
  label: Transit stop type
  description: >
    Individual subway station entrances and bus stops, plotted at their own
    coordinates rather than aggregated to a tract pie bubble. Added alongside
    the tract-level donut marker map as an alternate, less-aggregated view.
  unit: ""
  category_colors:
    Subway entrance: "#252525"
    Bus stop: "#db3232"
  source: MTA Subway Entrances and Exits (NYC OpenData); MTA Bus Stops (NYC OpenData)
  year: 2024
  geography: Individual subway entrance or bus stop (point)
  higher_is: context
  map_classification: categorical
  display_format: category
  filename: public_transportation_points.html

public_restrooms:
  domain: public_service
  short_label: Public restrooms
  label: Public restroom status and accessibility
  description: >
    Individual public restrooms (parks and NYPL library branches), colored by
    operational status and, if operational, ADA accessibility. Not listed in
    CB3_Data_Reference_by_Domain_v4.csv's Public Services rows; included as a
    standalone map from the available clean data.
  unit: ""
  category_colors:
    Fully Accessible: "#238b45"
    Not Accessible: "#d94701"
    Accessibility not reported: "#969696"
    Not operational or closed for construction: "#252525"
  source: NYC public restroom locations (parks and NYPL branches)
  year: 2026
  geography: Individual restroom (point)
  higher_is: context
  map_classification: categorical
  display_format: category
  filename: public_restrooms.html

