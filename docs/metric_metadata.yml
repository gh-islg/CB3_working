# --- Environmental Conditions ---

ej_area_flag:
  domain: environment
  short_label: EJ Area (2024)
  label: Designated Environmental Justice Area (MOCEJ 2024)
  description: >
    Binary flag indicating whether the census tract is designated a 2024
    Environmental Justice Area by the Mayor's Office of Climate and Environmental
    Justice. Designation is based on 2010 tract boundaries (GEOID10) and joined
    to 2020 tracts via the primary contributing source tract.
  unit: ""
  palette: ["#f7f7f7", "#252525"]
  source: MOCEJ EJ Areas 2024
  year: 2024
  geography: Census tract (assigned from 2010 boundaries via crosswalk)
  higher_is: neutral
  map_classification: binary
  display_format: flag

rodent_active_inspections:
  domain: environment
  short_label: Rodent inspections
  label: DOHMH rodent inspections with confirmed rat activity (latest 5 years, 2021–2026)
  description: >
    Count of DOHMH rodent inspections where the result was "Rat Activity" or
    "Failed for Rat Activity and Other Reason", indicating confirmed rat
    presence. Covers all inspection types (initial, compliance, treatments)
    filed in CB3, restricted to the latest 5 years of available data
    (relative to the most recent inspection in the source file) rather than
    the full 2002-2026 history, so the metric reflects recent conditions.
    Preferred over 311 call volume as a measure of actual infestation burden
    because it reflects DOHMH-confirmed evidence rather than resident
    reporting behavior.
  unit: " inspections"
  palette: ["#f7fbff", "#c6dbef", "#6baed6", "#2171b5", "#08306b"]
  source: DOHMH Rodent Inspection (NYC OpenData)
  year: 2026
  geography: Census tract (spatially joined from point coordinates; CENSUS TRACT field as fallback)
  higher_is: worse
  map_classification: quintile
  display_format: count
  filename: rodent_inspections.html

avg_acceptable_streets_pct:
  domain: environment
  short_label: Street cleanliness
  label: "Acceptable Streets % — 12-month average (Oct 2022–Aug 2023)"
  description: >
    Average monthly "Acceptable Streets %" scorecard rating across the 11 non-null
    months from October 2022 through August 2023 (September 2023 is present in the
    data but reported as null). Reported at the DSNY cleaning section level
    (MN031–MN034), not census tract. Higher values indicate more block-faces rated
    acceptably clean during DSNY inspections.
  unit: "%"
  palette: ["#ffffcc", "#c2e699", "#78c679", "#31a354", "#006837"]
  source: DSNY Scorecard Ratings (NYC OpenData)
  year: 2023
  geography: DSNY cleaning section (MN031–MN034)
  higher_is: better
  map_classification: continuous
  display_format: percent
  filename: avg_acceptable_streets.html

avg_acceptable_sidewalks_pct:
  domain: environment
  short_label: Sidewalk cleanliness
  label: "Acceptable Sidewalks % — 12-month average (Oct 2022–Aug 2023)"
  description: >
    Average monthly "Acceptable Sidewalks %" scorecard rating across the 11 non-null
    months from October 2022 through August 2023. Reported at the DSNY cleaning
    section level (MN031–MN034), not census tract. Higher values indicate more
    block-faces rated acceptably clean.
  unit: "%"
  palette: ["#ffffcc", "#c2e699", "#78c679", "#31a354", "#006837"]
  source: DSNY Scorecard Ratings (NYC OpenData)
  year: 2023
  geography: DSNY cleaning section (MN031–MN034)
  higher_is: better
  map_classification: continuous
  display_format: percent
  filename: avg_acceptable_sidewalks.html

indoor_air_quality_complaints:
  domain: environment
  short_label: Air quality complaints
  label: DOHMH indoor air quality complaints (2010–April 2026)
  description: >
