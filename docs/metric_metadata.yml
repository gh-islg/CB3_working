# --- Economic Security & Food ---

safety_net_enrollment_per_capita:
  domain: economic-security-food
  short_label: Safety-net enrollment
  label: Safety-net enrollment per capita
  description: >
    Community District-level Medicaid, SNAP, and cash assistance enrollment context
    divided by the tract ACS poverty-universe population. This is contextual and
    should not be interpreted as tract-assigned enrollment.
