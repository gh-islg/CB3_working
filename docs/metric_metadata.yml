# CB3 Equity Report — metric metadata
# One entry per output variable. Fields used by add_metric_layer() are marked (map).
# All other fields are for documentation, filtering, and future tooling.
#
# category_colors (map): {category: hex} mapping for categorical layers (points
# or polygons colored by category rather than a numeric quintile choropleth).
# Used instead of palette, which is reserved for quintile/continuous choropleths.
# map_classification: categorical marks entries that use it.

# --- Housing & Affordability ---

severe_rent_burden_pct:
  domain: housing_and_affordability
  short_label: Severe rent burden       # (map) layer-control toggle label
  label: Renters spending 50% or more of income on rent  # (map) tooltip alias
  description: >
    Share of renter households spending 50% or more of household income on gross
    rent, among those for whom rent burden could be computed.
  unit: "%"
  palette: ["#fff7ec", "#fee8c8", "#fdbb84", "#e34a33", "#7f0000"]
  source: ACS 5-year estimates, table B25070
  year: 2024
  geography: Census tract
  higher_is: worse
  map_classification: quintile
  display_format: percent
  filename: severe_rent_burden.html

crowded_households_pct:
  domain: housing_and_affordability
  short_label: Crowded housing
  label: Occupied households with more than one occupant per room
  description: >
    Share of occupied housing units with more than one occupant per room,
    combining owner- and renter-occupied households.
  unit: "%"
  palette: ["#f7fcf5", "#c7e9c0", "#74c476", "#238b45", "#00441b"]
  source: ACS 5-year estimates, table B25014
  year: 2024
  geography: Census tract
  higher_is: worse
  map_classification: quintile
  display_format: percent
  filename: crowded_housing.html

subsidized_units_expiring_2025_2030:
  domain: housing_and_affordability
  short_label: Subsidized properties at risk
  label: "Subsidized units with earliest recorded expiration in 2025–2030"
  description: >
    Number of residential units on subsidized properties whose earliest recorded
    subsidy end date falls between 2025 and 2030.
  unit: " units"
  palette: ["#f7fbff", "#c6dbef", "#6baed6", "#2171b5", "#08306b"]
  source: Furman Center Subsidized Housing Database
  year: 2025
  geography: Census tract
  higher_is: worse
  map_classification: quintile
  display_format: count
  filename: subsidized_housing_at_risk.html

