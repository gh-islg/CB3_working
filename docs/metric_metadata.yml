# --- Economic Security & Food ---

poverty_rate_pct:
  domain: economic-food
  short_label: Poverty rate
  label: Population below poverty level
  description: >
    Percentage of tract population whose income in the past 12 months
    was below the poverty level.
  unit: "%"
  palette: ["#ffffcc", "#ffeda0", "#feb24c", "#f03b20", "#bd0026"]
  source: ACS 5-year estimates, table B17020
  year: 2024
  geography: Census tract
  higher_is: worse
  map_classification: quintile
  display_format: percent
  filename: poverty_rate_pct.html

food_supply_gap_rank:
  domain: economic-food
  short_label: Food supply gap rank
  label: Emergency food supply gap rank
  description: >
    Emergency food supply gap rank joined to CB3 tracts. This metric is NTA-level
    and may repeat across tracts within the same NTA.
  unit: " rank"
  palette: ["#ffffcc", "#ffeda0", "#feb24c", "#f03b20", "#bd0026"]
  source: Emergency Food Supply Gap dataset
  year: 2026
  geography: NTA joined to census tract
  higher_is: worse
  map_classification: quintile
  display_format: number
  filename: food_supply_gap_rank.html

food_supply_gap_score:
  domain: economic-food
  short_label: Food supply gap score
  label: Emergency food supply gap weighted score
  description: >
    Weighted emergency food supply gap score joined to CB3 tracts. This metric is
    NTA-level and may repeat across tracts within the same NTA.
  unit: " score"
  palette: ["#ffffcc", "#ffeda0", "#feb24c", "#f03b20", "#bd0026"]
  source: Emergency Food Supply Gap dataset, Weighted_Score
  year: 2026
  geography: NTA joined to census tract
  higher_is: worse
  map_classification: quintile
  display_format: number
  filename: food_supply_gap_score.html