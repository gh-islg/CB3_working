new_affordable_units_since_2018:
  domain: housing_and_affordability
  short_label: New affordable housing
  label: Income-restricted units at new-construction affordable properties since 2018
  description: >
    Number of income-restricted ("counted") units at properties with a
    new-construction start year of 2018 or later. Excludes market-rate units
